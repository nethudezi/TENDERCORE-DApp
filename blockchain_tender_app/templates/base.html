<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenderCore | Blockchain Integrity</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
    <script>
        // Apply theme immediately to avoid flash
        (function(){
            const t = localStorage.getItem('tc-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>

    {% block content %}{% endblock %}

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const dark = html.getAttribute('data-theme') === 'dark';
            const next = dark ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            const lbl  = document.getElementById('dn-lbl');
            const icon = document.getElementById('dn-icon');
            if (lbl)  lbl.textContent  = next === 'dark' ? 'NIGHT' : 'DAY';
            if (icon) icon.textContent = next === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('tc-theme', next);
        }

        // Sync label/icon after load
        document.addEventListener('DOMContentLoaded', function(){
            const t = localStorage.getItem('tc-theme') || 'dark';
            const lbl  = document.getElementById('dn-lbl');
            const icon = document.getElementById('dn-icon');
            if (lbl)  lbl.textContent  = t === 'dark' ? 'NIGHT' : 'DAY';
            if (icon) icon.textContent = t === 'dark' ? '🌙' : '☀️';
        });
    </script>
</body>
</html>
